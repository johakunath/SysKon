name: CI

# SK-83: Merge-Gate. Stellt sicher, dass Tests und Build grün sind, bevor gemergt wird.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run build
